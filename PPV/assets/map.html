<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Leaflet -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- MapTiler SDK -->
    <script src="https://cdn.maptiler.com/maptiler-sdk-js/v3.10.2/maptiler-sdk.umd.min.js"></script>
    <link
      href="https://cdn.maptiler.com/maptiler-sdk-js/v3.10.2/maptiler-sdk.css"
      rel="stylesheet"
    />

    <!-- Leaflet MapTiler plugin -->
    <script src="https://cdn.maptiler.com/leaflet-maptilersdk/v4.1.0/leaflet-maptilersdk.umd.min.js"></script>

    <!-- Ionicons -->
    <script
      type="module"
      src="https://unpkg.com/ionicons@7.4.0/dist/ionicons/ionicons.esm.js"
    ></script>

    <style>
      html,
      body,
      #map {
        height: 100%;
        margin: 0;
        padding: 0;
      }

      /* Popup */
      .popup {
        min-width: 280px;
      }
      .gallery {
        display: flex;
        flex-direction: column;
        gap: 10px;
        max-height: 400px;
        overflow-y: auto;
      }
      .gallery img {
        width: 260px;
        max-height: 260px;
        object-fit: cover;
        border-radius: 10px;
      }

      /* Cluster count badge */
      .cnt {
        background: #3388ff;
        color: #fff;
        border-radius: 50%;
        width: 20px;
        height: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: bold;
        position: absolute;
        top: -4px;
        right: -4px;
        pointer-events: none;
      }
      .mw {
        position: relative;
        width: 36px;
        height: 36px;
      }

      /* Like button */
      .lbtn {
        background: none;
        border: 1px solid #e0aab0;
        cursor: pointer;
        font-size: 13px;
        color: #c0392b;
        padding: 3px 10px;
        border-radius: 12px;
        margin-top: 6px;
        display: inline-block;
        transition: background 0.2s;
      }
      .lbtn.on {
        background: #fde8e8;
        border-color: #c0392b;
      }

      /* Complete button */
      .cbtn {
        background: none;
        border: 1px solid #8bc34a;
        cursor: pointer;
        font-size: 13px;
        color: #388e3c;
        padding: 3px 10px;
        border-radius: 12px;
        margin-top: 6px;
        display: inline-block;
        transition: background 0.2s;
      }
      .cbtn.on {
        background: #e8f5e9;
        border-color: #388e3c;
      }

      .pe {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
      }

      /* Start task button */
      .sbtn {
        background: #1b5e20;
        border: none;
        cursor: pointer;
        font-size: 13px;
        color: #fff;
        padding: 6px 14px;
        border-radius: 12px;
        margin-top: 8px;
        display: inline-block;
      }
    </style>
  </head>

  <body>
    <div id="map"></div>

    <script>
      var TILE_KEY = 'O5UEYayzmhespubk3jjK';

      /* ── helpers ── */
      var msg = function (s) {
        window.ReactNativeWebView && window.ReactNativeWebView.postMessage(s);
      };
      var ck = function (a, b) {
        return parseFloat(a).toFixed(5) + ',' + parseFloat(b).toFixed(5);
      };

      /* ── map init ── */
      var map = L.map('map', { maxZoom: 22 }).setView([64.5, 26], 5);

      L.maptiler
        .maptilerLayer({
          apiKey: TILE_KEY,
          style:
            'https://api.maptiler.com/maps/019ce2a6-43ca-7ca4-9dc0-3d8eb2b49603/style.json?key=' +
            TILE_KEY,
        })
        .addTo(map);

      var gps = L.circleMarker([64.5, 26], {
        radius: 10,
        color: '#fff',
        fillColor: '#3388ff',
        fillOpacity: 1,
        weight: 3,
      })
        .addTo(map)
        .bindPopup('Sijaintisi');

      /* ── state ── */
      var C = {}; // photo clusters
      var T = {}; // task markers
      var liked = new Set();
      var fl = true; // first location flag
      var tr = false; // tracking flag

      /* ── click delegation ── */
      document.addEventListener('click', function (ev) {
        var btn = ev.target.closest('[data-toggle]');
        if (btn) {
          var id = btn.getAttribute('data-toggle');
          msg((liked.has(id) ? 'unlike:' : 'like:') + id);
          return;
        }
        var dbtn = ev.target.closest('[data-do-task]');
        if (dbtn) {
          msg('do-task:' + dbtn.getAttribute('data-do-task'));
        }
      });

      /* ── HTML builders ── */
      var photoHTML = function (e) {
        var l = liked.has(e.markerId);
        var cls = l ? 'lbtn on' : 'lbtn';
        var heart = l ? '\u2764\ufe0f' : '\u2661';
        return (
          '<img src="' +
          e.imageUrl +
          '"/>' +
          '<button class="' +
          cls +
          '" data-toggle="' +
          e.markerId +
          '">' +
          heart +
          ' ' +
          e.likes +
          '</button>'
        );
      };

      var galleryHTML = function (a) {
        var n =
          a.length > 1
            ? '<div style="font-size:12px;color:#666;margin-bottom:6px">' +
              a.length +
              ' kuvaa</div>'
            : '';
        return (
          '<div class="popup"><div class="gallery">' +
          n +
          a
            .map(function (e) {
              return '<div class="pe">' + photoHTML(e) + '</div>';
            })
            .join('') +
          '</div></div>'
        );
      };

      var taskHTML = function (t, d, img, id, lk) {
        var h = '<b>' + t + '</b>';
        if (d)
          h += '<br><span style="font-size:13px;color:#555">' + d + '</span>';
        var l = liked.has(id);
        if (l) {
          if (img)
            h +=
              '<br><img src="' +
              img +
              '" style="width:200px;max-height:200px;object-fit:cover;border-radius:8px;margin-top:8px"/>';
          h +=
            '<br><span style="color:#2e7d32;font-weight:bold">\u2705 Teht\u00e4v\u00e4 suoritettu!</span>';
        } else {
          h +=
            '<br><button class="sbtn" data-do-task="' +
            id +
            '">\ud83d\udcf7 Suorita teht\u00e4v\u00e4</button>';
        }
        return h;
      };

      /* ── icon builders ── */
      var mkI = function (n) {
        var badge = n > 1 ? '<div class="cnt">' + n + '</div>' : '';
        return L.divIcon({
          html:
            '<div class="mw">' +
            '<div style="background:#fff;border-radius:50%;width:36px;height:36px;' +
            'display:flex;align-items:center;justify-content:center;font-size:18px;' +
            'box-shadow:0 2px 6px rgba(0,0,0,.35)">\ud83d\udcf7</div>' +
            badge +
            '</div>',
          iconSize: [36, 36],
          iconAnchor: [18, 36],
          popupAnchor: [0, -38],
          className: '',
        });
      };

      var mkT = function (ic, co) {
        return L.divIcon({
          html:
            '<div style="background:' +
            (co || '#fff') +
            ';border-radius:50%;width:36px;height:36px;' +
            'display:flex;align-items:center;justify-content:center;' +
            'box-shadow:0 2px 6px rgba(0,0,0,.35)">' +
            '<ion-icon name="' +
            ic +
            '" style="font-size:20px;color:#fff"></ion-icon>' +
            '</div>',
          iconSize: [36, 36],
          iconAnchor: [18, 36],
          popupAnchor: [0, -38],
          className: '',
        });
      };

      /* ── public API (called from React Native via injectJavaScript) ── */

      var addTaskMarker = function (la, lo, t, ic, co, d, img, id, lk) {
        var m = L.marker([la, lo], {
          icon: mkT(ic || 'location', co || '#3388ff'),
        })
          .addTo(map)
          .bindPopup(taskHTML(t, d, img, id, lk), { maxWidth: 240 });
        T[id] = { marker: m, t: t, d: d, img: img, lk: lk };
      };

      var addPhotoToCluster = function (la, lo, url, id, lk) {
        var e = { imageUrl: url, markerId: id, likes: lk };
        var fk = null;

        for (var k in C) {
          var dr = ((C[k].la - la) * Math.PI) / 180;
          var dc = ((C[k].lo - lo) * Math.PI) / 180;
          var mr = (((C[k].la + la) / 2) * Math.PI) / 180;
          var dx = dc * Math.cos(mr) * 6371000;
          var dy = dr * 6371000;
          if (Math.sqrt(dx * dx + dy * dy) < 20) {
            fk = k;
            break;
          }
        }

        if (fk) {
          C[fk].entries.push(e);
          C[fk].marker.setIcon(mkI(C[fk].entries.length));
          C[fk].marker.setPopupContent(galleryHTML(C[fk].entries));
        } else {
          var nk = ck(la, lo);
          var m = L.marker([la, lo], { icon: mkI(1) })
            .addTo(map)
            .bindPopup(galleryHTML([e]), { maxWidth: 300 });
          C[nk] = { marker: m, entries: [e], la: la, lo: lo };
        }
      };

      var completeTaskMarkerUI = function (id, imgUrl) {
        liked.add(id);
        if (!T[id]) return;
        T[id].img = imgUrl;
        var gi = L.divIcon({
          html:
            '<div style="background:#2e7d32;border-radius:50%;width:36px;height:36px;' +
            'display:flex;align-items:center;justify-content:center;' +
            'box-shadow:0 2px 6px rgba(0,0,0,.35)">' +
            '<ion-icon name="checkmark" style="font-size:20px;color:#fff"></ion-icon>' +
            '</div>',
          iconSize: [36, 36],
          iconAnchor: [18, 36],
          popupAnchor: [0, -38],
          className: '',
        });
        T[id].marker.setIcon(gi);
        T[id].marker.setPopupContent(
          taskHTML(T[id].t, T[id].d, imgUrl, id, T[id].lk),
        );
      };

      var clearMarkers = function () {
        for (var k in C) {
          map.removeLayer(C[k].marker);
          delete C[k];
        }
        for (var k in T) {
          map.removeLayer(T[k].marker);
          delete T[k];
        }
      };

      var setLikedIds = function (ids) {
        liked = new Set(ids);
      };

      var updateLikes = function (id, n, on) {
        if (on) liked.add(id);
        else liked.delete(id);

        if (T[id]) T[id].lk = n;
        else {
          for (var k in C) {
            var e = C[k].entries.find(function (x) {
              return x.markerId === id;
            });
            if (e) {
              e.likes = n;
              break;
            }
          }
        }

        var btn = document.querySelector('[data-toggle="' + id + '"]');
        if (btn) {
          if (btn.classList.contains('lbtn')) {
            if (on) {
              btn.classList.add('on');
              btn.innerHTML = '\u2764\ufe0f ' + n;
            } else {
              btn.classList.remove('on');
              btn.innerHTML = '\u2661 ' + n;
            }
          } else if (btn.classList.contains('cbtn')) {
            if (on) {
              btn.classList.add('on');
              btn.innerHTML = '\u2705 Tehty';
            } else {
              btn.classList.remove('on');
              btn.innerHTML = '\u2b1c Merkkaa tehdyksi';
            }
          }
          return;
        }

        if (T[id]) {
          T[id].marker.setPopupContent(
            taskHTML(T[id].t, T[id].d, T[id].img, id, n),
          );
          return;
        }
        for (var k in C) {
          var e = C[k].entries.find(function (x) {
            return x.markerId === id;
          });
          if (e) {
            C[k].marker.setPopupContent(galleryHTML(C[k].entries));
            return;
          }
        }
      };

      var updateLocation = function (la, lo) {
        gps.setLatLng([la, lo]);
        if (fl) {
          map.setView([la, lo], 15);
          fl = false;
        } else if (tr) {
          map.panTo([la, lo]);
        }
      };

      var centerOnUser = function () {
        tr = true;
        map.setView(gps.getLatLng(), 16);
      };

      /* ── drag stops tracking ── */
      map.on('dragstart', function () {
        if (tr) {
          tr = false;
          msg('unlock');
        }
      });

      /* ── notify React Native when ready ── */
      (function nr() {
        window.ReactNativeWebView ? msg('ready') : setTimeout(nr, 50);
      })();
    </script>
  </body>
</html>
